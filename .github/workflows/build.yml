name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android Project
        run: |
          echo "Creating standard directory structure..."
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/java/com/asaad/patcher
          mkdir -p gradle/wrapper

          # Move user files if they exist
          [ -f index.html ] && mv index.html app/src/main/assets/
          [ -f MainActivity.kt ] && mv MainActivity.kt app/src/main/java/com/asaad/patcher/

          # Root settings.gradle
          cat <<EOF > settings.gradle
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "PatcherApp"
          include ':app'
          EOF

          # Root build.gradle
          cat <<EOF > build.gradle
          plugins {
              id 'com.android.application' version '8.2.2' apply false
              id 'org.jetbrains.kotlin.android' version '1.9.22' apply false
          }
          EOF

          # App build.gradle
          cat <<EOF > app/build.gradle
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }
          android {
              namespace 'com.asaad.patcher'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.asaad.patcher'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              kotlinOptions {
                  jvmTarget = '17'
              }
          }
          dependencies {
              implementation 'androidx.core:core-ktx:1.12.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

          # AndroidManifest.xml
          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.asaad.patcher">
              <uses-permission android:name="android.permission.INTERNET"/>
              <application
                  android:allowBackup="true"
                  android:label="Patcher App"
                  android:supportsRtl="true"
                  android:theme="@android:style/Theme.DeviceDefault.NoActionBar">
                  <activity
                      android:name="com.asaad.patcher.MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          echo "Downloading stable Gradle distribution..."
          curl -LO https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradlew
          curl -LO https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar
          curl -LO https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.properties
          
          mv gradle-wrapper.jar gradle/wrapper/
          mv gradle-wrapper.properties gradle/wrapper/
          chmod +x gradlew

      - name: Build with Gradle
        run: |
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          

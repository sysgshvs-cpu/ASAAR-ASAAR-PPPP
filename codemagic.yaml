workflows:
  android-native-workflow:
    name: Android Native APK Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - android-signing
      vars:
        PACKAGE_NAME: "com.asaad.patcher"
      node: latest
    scripts:
      - name: Set up Android project structure
        script: |
          echo "Setting up workspace..."
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/java/com/asaad/patcher
          mkdir -p app/src/main/cpp
          mkdir -p gradle/wrapper
          
          # Move files to proper Android structure
          [ -f index.html ] && mv index.html app/src/main/assets/
          [ -f MainActivity.kt ] && mv MainActivity.kt app/src/main/java/com/asaad/patcher/
          [ -f injector.cpp ] && mv injector.cpp app/src/main/cpp/
          
          # Create baseline build files
          cat <<EOF > settings.gradle
          rootProject.name = "PatcherApp"
          include ':app'
          EOF
          
          cat <<EOF > build.gradle
          buildscript {
              repositories { 
                  google()
                  mavenCentral() 
              }
              dependencies { 
                  classpath 'com.android.tools.build:gradle:8.2.2'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.22" 
              }
          }
          allprojects { 
              repositories { 
                  google()
                  mavenCentral() 
              } 
          }
          EOF
          
          cat <<EOF > app/build.gradle
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }
          android {
              namespace 'com.asaad.patcher'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.asaad.patcher'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
              externalNativeBuild {
                  cmake {
                      path "CMakeLists.txt"
                  }
              }
          }
          EOF

          cat <<EOF > CMakeLists.txt
          cmake_minimum_required(VERSION 3.22.1)
          project("patcher")
          add_library(injector SHARED app/src/main/cpp/injector.cpp)
          find_library(log-lib log)
          target_link_libraries(injector \${log-lib})
          EOF

          # Manually download and setup Gradle Wrapper to avoid missing command error
          echo "Downloading Gradle Wrapper..."
          curl -LO https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradlew
          curl -LO https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.jar
          curl -LO https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.properties
          
          mv gradle-wrapper.jar gradle/wrapper/
          mv gradle-wrapper.properties gradle/wrapper/
          chmod +x gradlew
      - name: Build Android APK
        script: |
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/**/*.apk
      
